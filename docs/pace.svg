<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" font-family="'JetBrainsMono Nerd Font', 'CaskaydiaCove Nerd Font', 'Hack Nerd Font', ui-monospace, Menlo, monospace" font-size="20">
  <rect width="760" height="240" rx="8" fill="#1e1e2e"/>

  <text x="20" y="50" xml:space="preserve">
    <tspan fill="#a6e3a1" font-weight="bold">󰁞 under pace  </tspan><tspan fill="#cdd6f4">██</tspan><tspan fill="#585b70">░░░</tspan><tspan fill="#89dceb" font-weight="bold">│</tspan><tspan fill="#585b70">░░</tspan><tspan fill="#7f849c">   30% used · 80% elapsed</tspan>
  </text>

  <text x="20" y="110" xml:space="preserve">
    <tspan fill="#f9e2af" font-weight="bold">󰁕 on pace     </tspan><tspan fill="#cdd6f4">████</tspan><tspan fill="#89dceb" font-weight="bold">│</tspan><tspan fill="#585b70">░░░</tspan><tspan fill="#7f849c">   50% used · 50% elapsed</tspan>
  </text>

  <text x="20" y="170" xml:space="preserve">
    <tspan fill="#f38ba8" font-weight="bold">󰁝 slow down   </tspan><tspan fill="#cdd6f4">██████</tspan><tspan fill="#585b70">░</tspan><tspan fill="#89dceb" font-weight="bold">│</tspan><tspan fill="#7f849c">   80% used · 40% elapsed</tspan>
  </text>

  <text x="20" y="220" font-size="13" fill="#6c7086" xml:space="preserve">cyan │ marker = expected utilization based on time elapsed in the reset window</text>
</svg>
